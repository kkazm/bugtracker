debug: true


myapp:
  jwtKey: hi # TODO

jwt:
  private:
    key: classpath:app.key
  public:
    key: classpath:app.pub

spring:
  profiles:
    active: devel
  devtools:
    #add-properties: false
    restart:
      quiet-period: 2000
      poll-interval: 2001
      #log-condition-evaluation-delta: false
  h2:
    console:
      enabled: true
  liquibase:
    enabled: false
  datasource:
    url: jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    #url: 'jdbc:postgresql://localhost/mydb'
    #username: postgres
    #password: helloworldjava
    #hikari:
    #  maximum-pool-size: 150
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        #jpa:
        #  compliance:
        #    query: true # Force JPA Query compliance (not recommended)
        highlight_sql: true
        #generate_statistics: true
        #use_sql_comments: true
        #dialect: org.hibernate.dialect.PostgreSQLDialect
        #format_sql: true
    open-in-view: false
    #generate-ddl: true
  data:
    web:
      pageable:
        max-page-size: 40 # TODO
  threads:
    virtual:
      enabled: true
  #aop:
  #  proxy-target-class: false
  #web:
  #mvc:
  #  problemdetails:
  #    enabled: true

server:
  error:
    include-stacktrace: never # The field "trace" with stacktrace is present if you have spring-boot-devtools in your classpath
    include-message: always
    #whitelabel:
    #  enabled: false
  compression:
    enabled: true

logging:
  level:
    org:
      hibernate:
      #  SQL: DEBUG
      #  engine:
      #    transaction: DEBUG
      #  orm:
      #    jdbc:
      #      bind: trace
      #      extract: trace
      #type: trace
      springframework:
        #orm:
        #  jpa: DEBUG
        #transaction: DEBUG
        #transaction.interceptor: TRACE
        #aop:
        #  framework: trace
        boot:
          autoconfigure:
            logging:
              ConditionEvaluationReportLogger: info # Suppress conditions evaluation report
    #sql: debug
    #root: trace
  pattern:
    dateformat: HH:mm:ss.SSS

management:
  endpoint:
    beans:
      access: unrestricted # TODO
  endpoints:
    web:
      exposure:
        include: 'health,beans' # TODO

springdoc:
  show-actuator: false
